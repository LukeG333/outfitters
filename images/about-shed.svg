<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 460" role="img" aria-label="The original Scituate boat shed">
  <rect width="600" height="460" fill="#cfe3e5"/>
  <rect y="300" width="600" height="160" fill="#1b6b73"/>
  <g opacity="0.3" stroke="#14555c" fill="none" stroke-width="2">
    <path d="M0 340 Q150 320 300 340 T600 340"/>
    <path d="M0 380 Q150 360 300 380 T600 380"/>
    <path d="M0 420 Q150 400 300 420 T600 420"/>
  </g>
  <!-- sky birds -->
  <g stroke="#355663" stroke-width="3" fill="none">
    <path d="M70 70 q12 -10 24 0"/><path d="M94 70 q12 -10 24 0"/>
    <path d="M470 50 q10 -8 20 0"/><path d="M490 50 q10 -8 20 0"/>
  </g>
  <!-- shed -->
  <g transform="translate(150 120)">
    <rect x="0" y="80" width="300" height="160" fill="#e3d8be"/>
    <path d="M-20 80 L150 0 L320 80 Z" fill="#e0612f"/>
    <rect x="40" y="130" width="70" height="110" fill="#14555c"/>
    <rect x="190" y="130" width="80" height="70" fill="#9fd0d4"/>
    <line x1="230" y1="130" x2="230" y2="200" stroke="#14555c" stroke-width="4"/>
    <line x1="190" y1="165" x2="270" y2="165" stroke="#14555c" stroke-width="4"/>
    <circle cx="150" cy="60" r="16" fill="none" stroke="#e3d8be" stroke-width="5"/>
  </g>
  <!-- dock posts -->
  <g fill="#14555c">
    <rect x="60" y="300" width="14" height="120"/><rect x="120" y="300" width="14" height="120"/>
    <rect x="500" y="300" width="14" height="120"/>
  </g>
</svg>
